<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Vision Board</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Vision Board">
    
    <style>
        :root {
            --primary-color: #C5D0E6; 
            --bg-color: #F8FAFC;       
            --card-bg: #FFFFFF;
            --text-main: #0F172A;      
            --text-muted: #94A3B8;
            --border-color: #E2E8F0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            background-color: var(--bg-color);
            width: 100%;
            height: 100%;
            overflow: hidden;
            color: var(--text-main);
        }

        .app-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: var(--bg-color);
        }

        .header {
            background-color: var(--bg-color);
            padding: 55px 24px 16px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .back-btn {
            position: absolute;
            left: 24px;
            top: 55px;
            background: none;
            border: none;
            cursor: pointer;
            display: none;
            -webkit-tap-highlight-color: transparent;
        }
        .back-btn svg {
            width: 24px;
            height: 24px;
            stroke: var(--text-main);
            fill: none;
            stroke-width: 2.5;
        }

        .add-action-btn {
            position: absolute;
            right: 24px;
            top: 55px;
            background: none;
            border: none;
            cursor: pointer;
            display: none;
            -webkit-tap-highlight-color: transparent;
        }
        .add-action-btn svg {
            width: 24px;
            height: 24px;
            stroke: var(--text-main);
            fill: none;
            stroke-width: 2.5;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.3px;
            color: var(--text-main);
            text-transform: uppercase;
            padding: 0 40px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header .subtitle {
            font-size: 11px;
            margin-top: 4px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .boards-viewport {
            flex: 1;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            padding-bottom: 110px;
            -webkit-overflow-scrolling: touch;
        }

        .boards-viewport::-webkit-scrollbar {
            display: none;
        }

        .grid-page {
            height: 100%;
            min-height: 100%;
            scroll-snap-align: start;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 12px;
            padding: 10px 20px 20px;
        }

        .grid-item {
            border-radius: 20px;
            padding: 14px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            background-size: cover;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .grid-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.6));
            z-index: 1;
        }

        .grid-item:active {
            transform: scale(0.94);
        }

        .grid-text {
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 700;
            line-height: 1.3;
            letter-spacing: 0.2px;
            text-transform: uppercase;
            z-index: 2;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: var(--primary-color);
            color: var(--text-main);
            font-size: 10px;
            min-width: 18px;
            height: 18px;
            padding: 0 4px;
            border-radius: 50%;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .task-container {
            display: none;
            flex-direction: column;
            flex: 1;
            padding: 10px 24px 24px;
            overflow-y: auto;
            padding-bottom: 110px;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 16px;
            background-color: var(--card-bg);
            border-radius: 20px;
            margin-bottom: 12px;
            gap: 14px;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.02);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .task-item.completed {
            opacity: 0.4;
        }
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }
        .task-item.completed .task-media {
            filter: grayscale(1);
        }

        .task-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            cursor: pointer;
        }

        .task-text {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
        }

        .task-media {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: block;
        }

        .custom-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, border-color 0.2s;
            margin-top: 2px;
            flex-shrink: 0;
        }
        .task-item.completed .custom-checkbox {
            background-color: var(--text-main);
            border-color: var(--text-main);
        }
        .custom-checkbox::after {
            content: "";
            width: 5px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-bottom: 2px;
            display: none;
        }
        .task-item.completed .custom-checkbox::after {
            display: block;
        }

        .delete-task-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 22px;
            padding: 0 4px;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: -2px;
        }

        /* Нативное выезжающее меню (Action Sheet) */
        .action-sheet-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: flex-end;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .action-sheet-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .action-sheet {
            width: 100%;
            background: var(--card-bg);
            border-radius: 28px 28px 0 0;
            padding: 24px 24px 44px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
        }
        .action-sheet-overlay.active .action-sheet {
            transform: translateY(0);
        }
        .action-sheet-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            margin-bottom: 20px;
        }
        .action-sheet-btn {
            width: 100%;
            padding: 16px;
            background: var(--bg-color);
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 10px;
            text-align: center;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            -webkit-tap-highlight-color: transparent;
        }
        .action-sheet-btn.cancel {
            background: transparent;
            color: #EF4444;
            margin-bottom: 0;
            margin-top: 10px;
        }

        /* НОВОЕ: Стильное кастомное модальное окно для ввода текста целей */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 110;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            padding: 24px;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            width: 100%;
            max-width: 340px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            transform: scale(0.9);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
            text-align: center;
        }
        .modal-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
            text-align: center;
        }
        .modal-input {
            width: 100%;
            padding: 14px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px; /* 16px предотвращает автозум экрана в iOS Safari */
            color: var(--text-main);
            outline: none;
            -webkit-user-select: text;
            user-select: text;
        }
        .modal-input:focus {
            border-color: #A5B4FC;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .modal-btn.cancel {
            background: var(--bg-color);
            color: var(--text-muted);
        }
        .modal-btn.save {
            background: var(--text-main);
            color: #FFFFFF;
        }

        .bottom-nav {
            position: absolute;
            bottom: 30px;
            left: 24px;
            right: 24px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
            z-index: 10;
        }

        .nav-item {
            background: none;
            border: none;
            padding: 8px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-item svg {
            width: 22px;
            height: 22px;
            stroke: var(--text-main);
            fill: none;
            stroke-width: 2;
        }
    </style>
</head>
<body>

<input type="file" id="globalFileInput" accept="image/*" style="display:none;">

<div class="app-container">
    <header class="header">
        <button class="back-btn" id="backBtn">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h1 id="mainTitle">MY VISION BOARD</h1>
        <button class="add-action-btn" id="addActionBtn">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <div class="subtitle" id="subTitle">СТРАНИЦА 1</div>
    </header>

    <div class="boards-viewport" id="boardsViewport">
        <div class="grid-page" id="page1"></div>
        <div class="grid-page" id="page2"></div>
    </div>

    <div class="task-container" id="taskContainer">
        <ul class="task-list" id="taskList"></ul>
    </div>

    <div class="action-sheet-overlay" id="actionSheetOverlay">
        <div class="action-sheet">
            <div class="action-sheet-title" id="actionSheetTitle">Действия с целью</div>
            <button class="action-sheet-btn" id="actionAddText">📝 Добавить текстовую цель</button>
            <button class="action-sheet-btn" id="actionUploadPhoto">📸 Загрузить фото к цели</button>
            <button class="action-sheet-btn cancel" id="actionCancel">Отмена</button>
        </div>
    </div>

    <div class="modal-overlay" id="inputModalOverlay">
        <div class="modal-content">
            <div class="modal-title" id="modalTitleText">Новая цель</div>
            <div class="modal-subtitle" id="modalSubtitleText">Что вы хотите реализовать?</div>
            <input type="text" class="modal-input" id="modalTextInput" placeholder="Введите текст сюда..." maxlength="120">
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="modalCancelBtn">Отмена</button>
                <button class="modal-btn save" id="modalSaveBtn">Сохранить</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item" id="navInfo">
            <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
        <button class="nav-item" id="navHome">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </button>
        <button class="nav-item" id="navClear">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <button class="nav-item" id="navReset">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
    </nav>
</div>

<script>
    const page1Categories = [
        { id: "wealth", title: "Богатство", img: "https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?q=80&w=500&auto=format&fit=crop" },
        { id: "fame", title: "Слава", img: "https://images.unsplash.com/photo-1507679799987-c73779587ccf?q=80&w=500&auto=format&fit=crop" },
        { id: "love", title: "Любовь", img: "https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?q=80&w=500&auto=format&fit=crop" },
        { id: "family", title: "Семья", img: "https://images.unsplash.com/photo-1609234656388-0ff363383899?q=80&w=500&auto=format&fit=crop" },
        { id: "health", title: "Здоровье", img: "https://images.unsplash.com/photo-1506126613408-eca07ce68773?q=80&w=500&auto=format&fit=crop" },
        { id: "creativity", title: "Творчество", img: "https://images.unsplash.com/photo-1513364776144-60967b0f800f?q=80&w=500&auto=format&fit=crop" },
        { id: "knowledge", title: "Знания", img: "https://images.unsplash.com/photo-1506880018603-83d5b814b5a6?q=80&w=500&auto=format&fit=crop" },
        { id: "career", title: "Карьера", img: "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=500&auto=format&fit=crop" },
        { id: "travel", title: "Путешествия", img: "https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?q=80&w=500&auto=format&fit=crop" }
    ];

    const page2Categories = [
        { id: "rest", title: "Отдых", img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=500&auto=format&fit=crop" },
        { id: "habits", title: "Привычки", img: "https://images.unsplash.com/photo-1506784983877-45594efa4cbe?q=80&w=500&auto=format&fit=crop" },
        { id: "spirit", title: "Дух", img: "https://images.unsplash.com/photo-1518241353330-0f7941c2d9b5?q=80&w=500&auto=format&fit=crop" },
        { id: "shopping", title: "Покупки", img: "https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=500&auto=format&fit=crop" },
        { id: "pets", title: "Питомцы", img: "https://images.unsplash.com/photo-1543466835-00a7907e9de1?q=80&w=500&auto=format&fit=crop" },
        { id: "goals", title: "Цели", img: "https://images.unsplash.com/photo-1517842645767-c639042777db?q=80&w=500&auto=format&fit=crop" },
        { id: "sport", title: "Спорт", img: "https://images.unsplash.com/photo-1517838277536-f5f99be501cd?q=80&w=500&auto=format&fit=crop" },
        { id: "friends", title: "Друзья", img: "https://images.unsplash.com/photo-1511632765486-a01980e01a18?q=80&w=500&auto=format&fit=crop" },
        { id: "home", title: "Дом", img: "https://images.unsplash.com/photo-1513694203232-719a280e022f?q=80&w=500&auto=format&fit=crop" }
    ];

    let allTodos = JSON.parse(localStorage.getItem('visionBoardTodosScroll')) || {};
    let currentCategory = null;
    let pendingImageBase64 = null; // Для временного хранения фото перед сохранением

    const boardsViewport = document.getElementById('boardsViewport');
    const page1Container = document.getElementById('page1');
    const page2Container = document.getElementById('page2');
    const taskContainer = document.getElementById('taskContainer');
    
    const backBtn = document.getElementById('backBtn');
    const addActionBtn = document.getElementById('addActionBtn');
    const mainTitle = document.getElementById('mainTitle');
    const subTitle = document.getElementById('subTitle');
    const taskList = document.getElementById('taskList');

    const actionSheetOverlay = document.getElementById('actionSheetOverlay');
    const actionSheetTitle = document.getElementById('actionSheetTitle');
    const actionAddText = document.getElementById('actionAddText');
    const actionUploadPhoto = document.getElementById('actionUploadPhoto');
    const actionCancel = document.getElementById('actionCancel');
    const globalFileInput = document.getElementById('globalFileInput');

    // Элементы нового красивого окна ввода
    const inputModalOverlay = document.getElementById('inputModalOverlay');
    const modalTitleText = document.getElementById('modalTitleText');
    const modalSubtitleText = document.getElementById('modalSubtitleText');
    const modalTextInput = document.getElementById('modalTextInput');
    const modalCancelBtn = document.getElementById('modalCancelBtn');
    const modalSaveBtn = document.getElementById('modalSaveBtn');

    function renderPageGrid(container, categoriesList) {
        container.innerHTML = '';
        categoriesList.forEach(cat => {
            const activeTasksCount = (allTodos[cat.id] || []).filter(t => !t.completed).length;
            const item = document.createElement('div');
            item.className = 'grid-item';
            item.style.backgroundImage = `url('${cat.img}')`;
            item.onclick = () => openCategory(cat);
            item.innerHTML = `
                <div class="badge" id="badge-${cat.id}" style="display: ${activeTasksCount > 0 ? 'flex' : 'none'}">${activeTasksCount}</div>
                <div class="grid-text">${cat.title}</div>
            `;
            container.appendChild(item);
        });
    }

    function initAllGrids() {
        renderPageGrid(page1Container, page1Categories);
        renderPageGrid(page2Container, page2Categories);
    }

    boardsViewport.addEventListener('scroll', () => {
        if (currentCategory) return;
        const viewHeight = boardsViewport.clientHeight;
        const pageIndex = Math.round(boardsViewport.scrollTop / viewHeight) + 1;
        subTitle.textContent = `СТРАНИЦА ${pageIndex}`;
    });

    function openCategory(cat) {
        currentCategory = cat.id;
        boardsViewport.style.display = 'none';
        taskContainer.style.display = 'flex';
        backBtn.style.display = 'block';
        addActionBtn.style.display = 'block';
        mainTitle.textContent = cat.title;
        subTitle.textContent = "План реализации";
        actionSheetTitle.textContent = cat.title;
        renderTasks();
    }

    function goHome() {
        currentCategory = null;
        boardsViewport.style.display = 'block';
        taskContainer.style.display = 'none';
        backBtn.style.display = 'none';
        addActionBtn.style.display = 'none';
        mainTitle.textContent = "MY VISION BOARD";
        const viewHeight = boardsViewport.clientHeight;
        subTitle.textContent = `СТРАНИЦА ${Math.round(boardsViewport.scrollTop / viewHeight) + 1}`;
        initAllGrids();
    }

    function renderTasks() {
        taskList.innerHTML = '';
        const tasks = allTodos[currentCategory] || [];
        tasks.forEach((task, index) => {
            const li = document.createElement('li');
            li.className = `task-item ${task.completed ? 'completed' : ''}`;
            
            li.innerHTML = `
                <div class="custom-checkbox" onclick="toggleTask(${index})"></div>
                <div class="task-body" onclick="toggleTask(${index})">
                    ${task.text ? `<span class="task-text">${task.text}</span>` : ''}
                    ${task.image ? `<img src="${task.image}" class="task-media" alt="Фото цели">` : ''}
                </div>
                <button class="delete-task-btn" onclick="deleteTask(${index})">&times;</button>
            `;
            taskList.appendChild(li);
        });
    }

    // Управление контекстным меню
    addActionBtn.addEventListener('click', () => {
        actionSheetOverlay.classList.add('active');
    });

    function closeActionSheet() {
        actionSheetOverlay.classList.remove('active');
    }

    actionSheetOverlay.addEventListener('click', (e) => {
        if (e.target === actionSheetOverlay) closeActionSheet();
    });
    actionCancel.addEventListener('click', closeActionSheet);

    // Управление красивым окном ввода (Взамен prompt)
    function openInputModal(title, subtitle, placeholder = "Напишите цель...") {
        modalTitleText.textContent = title;
        modalSubtitleText.textContent = subtitle;
        modalTextInput.placeholder = placeholder;
        modalTextInput.value = "";
        inputModalOverlay.classList.add('active');
        setTimeout(() => modalTextInput.focus(), 150); // автофокус на ввод
    }

    function closeInputModal() {
        inputModalOverlay.classList.remove('active');
        modalTextInput.blur();
    }

    modalCancelBtn.addEventListener('click', closeInputModal);

    // Клик на «Добавить текстовую цель»
    actionAddText.addEventListener('click', () => {
        closeActionSheet();
        pendingImageBase64 = null; // фото нет, только текст
        setTimeout(() => {
            openInputModal("Новая цель", "Запишите то, к чему стремитесь:", "Например: Купить билеты в Рим");
        }, 200);
    });

    // Клик на «Загрузить фото к цели»
    actionUploadPhoto.addEventListener('click', () => {
        closeActionSheet();
        globalFileInput.click();
    });

    // Обработка загрузки, сжатия фото и вызов окна для подписи
    globalFileInput.addEventListener('change', (event) => {
        const file = event.target.files[0];
        if (!file || !currentCategory) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 480;
                const MAX_HEIGHT = 480;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                } else {
                    if (height > MAX_HEIGHT) {
                        width *= MAX_HEIGHT / height;
                        height = MAX_HEIGHT;
                    }
                }
                
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                // Сжимаем до web-формата, чтобы не перегружать память
                pendingImageBase64 = canvas.toDataURL('image/jpeg', 0.70);
                
                // Открываем модальное окно для подписи фото цели
                openInputModal("Визуализация цели", "Добавьте описание к фото (необязательно):", "Например: Отель моей мечты...");
                globalFileInput.value = ''; // сброс
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });

    // Кнопка «Сохранить» в модальном окне ввода
    modalSaveBtn.addEventListener('click', () => {
        const text = modalTextInput.value.trim();
        
        // Если нет ни текста, ни фото — ничего не сохраняем
        if (!text && !pendingImageBase64) {
            closeInputModal();
            return;
        }

        if (!allTodos[currentCategory]) allTodos[currentCategory] = [];
        
        // Пушим новую цель в массив
        allTodos[currentCategory].push({
            text: text,
            image: pendingImageBase64,
            completed: false
        });

        saveData();
        renderTasks();
        closeInputModal();
        pendingImageBase64 = null; // очищаем буфер
    });

    // Сохранение по нажатию Enter на клавиатуре
    modalTextInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            modalSaveBtn.click();
        }
    });

    window.toggleTask = function(index) {
        allTodos[currentCategory][index].completed = !allTodos[currentCategory][index].completed;
        saveData();
        renderTasks();
    };

    window.deleteTask = function(index) {
        allTodos[currentCategory].splice(index, 1);
        saveData();
        renderTasks();
    };

    function saveData() {
        localStorage.setItem('visionBoardTodosScroll', JSON.stringify(allTodos));
    }

    document.getElementById('navInfo').addEventListener('click', () => {
        let total = 0;
        [...page1Categories, ...page2Categories].forEach(cat => {
            total += (allTodos[cat.id] || []).filter(t => !t.completed).length;
        });
        alert(`Всего активных целей: ${total}`);
    });

    document.getElementById('navHome').addEventListener('click', () => {
        boardsViewport.scrollTop = 0;
        goHome();
    });

    document.getElementById('navClear').addEventListener('click', () => {
        if (!currentCategory) return alert("Сначала откройте любую сферу!");
        if (allTodos[currentCategory]) {
            allTodos[currentCategory] = allTodos[currentCategory].filter(t => !t.completed);
            saveData();
            renderTasks();
        }
    });

    document.getElementById('navReset').addEventListener('click', () => {
        if (confirm("Очистить все цели и фотографии?")) {
            allTodos = {};
            localStorage.removeItem('visionBoardTodosScroll');
            boardsViewport.scrollTop = 0;
            goHome();
        }
    });

    backBtn.addEventListener('click', goHome);
    initAllGrids();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
        .then(() => console.log('PWA OK'))
        .catch(err => console.log('PWA ERR', err));
    }
</script>

</body>
</html>
